baseURL = 'https://rajnoor.in/'
languageCode = 'en-us'
title = 'Rajnoor'
disableKinds = ["taxonomy", "term"]

[outputs]
  home    = ["html", "json"]   # json: search index for spotlight (B3)
  section = ["html", "rss"]   # rss: notebook feed
  page    = ["html"]

[markup]
  [markup.highlight]
    codeFences = false   # Let Prism handle fenced code blocks in .md files
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Needed to allow raw HTML inside Markdown
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block  = [["$$", "$$"]]
        inline = [["$", "$"]]

[params]
  math = true  # Enables math rendering

[params.features]
  notebook           = false
  nowPage            = true
  nowExpanded =   true   # true → <details open> on /now/ page; false → collapsed by default
  spotlight          = true
  scrollArc          = true
  shortcutHints      = true
