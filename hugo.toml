baseURL = 'https://rajnoor.in/'
languageCode = 'en-us'
title = 'Rajnoor'
disableKinds = ["taxonomy", "term"]

[outputs]
  home    = ["html", "json"]   # json: search index for command palette (B3)
  section = ["html", "rss"]   # rss: notebook feed
  page    = ["html"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Needed to allow raw HTML inside Markdown

[params]
  math = true  # Enables math rendering

[params.features]
  notebook        = false
  nowPage         = false
  commandPalette  = false
  scrollArc       = false
  shortcutHints   = false
