# Non-colour design tokens injected into CSS via resources.ExecuteAsTemplate.
# Colour tokens live in data/colors.yaml.

fonts:
  - token: my-font-title
    typeface: '"Spectral", serif'

  - token: my-font-subtitle
    typeface: '"Instrument Serif", serif'

  - token: my-font-subtitle-alt
    typeface: '"Edu SA Beginner", cursive'

  - token: my-font-article
    typeface: '"Slabo 27px", serif'

  - token: my-font-article-alt
    typeface: '"Quicksand", sans-serif'

  - token: my-font-ui
    typeface: '"Montserrat", sans-serif'

  - token: my-font-code
    typeface: '"Inconsolata", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace'

  - token: my-font-hero
    typeface: 'var(--my-font-title)'

  - token: my-font-nav
    typeface: 'var(--my-font-title)'

  - token: my-font-button
    typeface: 'var(--my-font-ui)'

  - token: my-font-date
    typeface: 'var(--my-font-ui)'

  - token: my-font-form
    typeface: 'var(--my-font-ui)'

  - token: my-font-lede
    typeface: 'var(--my-font-subtitle-alt)'
    
  - token: my-font-caption
    typeface: 'var(--my-font-ui)'

motion:
  fast: 120ms
  base: 200ms
  slow: 350ms
  loader: 1.2s
  # Named one-off durations — bespoke choreography that sits outside the
  # fast/base/slow scale, kept here so every duration is tunable in one place.
  hero-draw: 3.8s        # home calligraphy write/unwrite keyframes
  hero-fill: 2s          # home .gtd-path fill + dashoffset transition
  cursor-blink: 0.8s     # home typed-hero caret blink
  signature-fade: 1.75s  # signature pill fade-in on load
  signature-draw: 2s     # signature R-stroke write-on
  signature-delay: 0.5s  # delay before the R-stroke write-on
  rotate: 1s             # .rotate utility spin
  discover-pulse: 2.4s   # signature discover-pulse attention ring
  loader-fade: 0.45s     # page-loader fade-out
  loader-reduced: 3s     # spinner period under prefers-reduced-motion

# Corner radius scale. Hairline radii (1px/2px) stay inline at their use
# sites — they're not part of this semantic scale.
radius:
  sm: 4px
  md: 12px
  pill: 999px

z_index:
  rail: 1
  pill: 8
  fixed: 10
  overlay: 1400
  hints: 1500
  toast: 1501
  critical: 9000

shadows:
  - size: sm
    value: '0 0 8px 0 var(--my-shadow-color)'
  - size: md
    value: '0 0 10px 0 var(--my-shadow-color)'
  - size: lg
    value: '0 12px 48px var(--my-shadow-color)'
  # Structural surface shadow for frosted panels (command-console family,
  # page-panel, chapter strip). Uses the border colour, not the elevation
  # shadow colour — it reads as a hairline lift, not a drop shadow.
  - size: panel
    value: 'var(--my-border-color) 0px 3px 6px'

glows:
  - size: sm
    value: 'var(--my-theme-accent) 0 0 1px'
  - size: md
    value: 'var(--my-theme-accent) 0 0 4px'
  - size: lg
    value: 'var(--my-theme-accent) 0 0 8px'

# Credentials-page spacing knobs (read directly by assets/css/credStyle.css via
# ExecuteAsTemplate, emitted as page-scoped --cred-* custom properties). Tune the
# breathing room of the surfaced cards and the skill-pill row here.
credentials:
  card_gap: '3rem'        # gap between certificate / publication cards
  card_padding: '0.9rem'  # internal padding inside each card (Bootstrap p-2 was 0.5rem)
  skill_gap: '0.75rem'    # gap between skill pills
