{{/* Renders the three GTD hero SVG phrases from data/heroPhrases.yaml.
     Usage: {{< heroPhrase >}}  — no arguments. */}}
<div class="align-items-center" id="gtd-container">
  {{ range site.Data.heroPhrases }}
  <div id="{{ .id }}" class="container gtd-container">
    <svg version="1.1" viewBox="{{ .viewBox }}" xmlns="http://www.w3.org/2000/svg" class="gtd-svg">
      <path class="gtd-path draw"
            transform="{{ .transform }}"
            d="{{ .pathData }}"
            pathLength="1"
            aria-label="{{ .ariaLabel }}"/>
    </svg>
  </div>
  {{ end }}
</div>
